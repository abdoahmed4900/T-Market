<div class="products mt-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
    <div class="lg:col-span-2 flex flex-col gap-6">
         @for (item of [1,2,3]; track $index) {
         <section class="cart-card px-3 pt-1 flex items-start rounded-xl border-1 gap-4 flex-col lg:flex-row justify-between">
             <div class="rounded-4xl p-4 md:h-[250px] h-70 lg:w-70 w-full skeleton-basic"></div>
             <section class="details flex flex-col justify-between w-full flex-wrap gap-4 p-4 items-start">

                 <div class="text-skeleton skeleton-basic"></div>
                 <div class="cart-actions flex items-center flex-row gap-3 flex-wrap w-full">
                 <div class="text-skeleton skeleton-basic"></div>
                 <div class="small-text-skeleton skeleton-basic"></div>
                 <div class="small-text-skeleton skeleton-basic"></div>
                 <div class="small-text-skeleton skeleton-basic"></div>
                 <div class="small-text-skeleton skeleton-basic"></div>
                 </div>
             </div>
             </section>
         </section>
         }
     </div>
     <div class="w-full h-70 rounded-xl skeleton-basic"></div>
 </div>
<div class="skeleton-basic mt-4 rounded-xl"></div>
